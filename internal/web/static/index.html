<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервис Уведомлений</title>
    <!-- Подключаем файл со стилями -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Сервис Уведомлений</h1>

        <!-- Форма для создания нового уведомления -->
        <form id="notificationForm" class="card">
            <h2>Создать новое уведомление</h2>
            
            <div class="form-group">
                <label for="message">Текст сообщения:</label>
                <input type="text" id="message" name="message" placeholder="Напомнить о встрече" required>
            </div>
            
            <div class="form-group">
                <label for="send_at">Дата и время отправки:</label>
                <input type="datetime-local" id="send_at" name="send_at" required>
            </div>
            
            <button type="submit">Запланировать</button>
        </form>

        <!-- Секция для отображения списка текущих уведомлений -->
        <section class="card">
            <h2>Запланированные уведомления</h2>
            <div id="notificationsList">
                <!-- Уведомления будут добавлены сюда с помощью JavaScript -->
            </div>
        </section>
    </main>

    <!-- Подключаем JavaScript в конце тела, чтобы страница загрузилась быстрее -->
    <script src="main.js"></script>
</body>
</html>
